---
# Configure time synchronization

- name: Ensure systemd-timesyncd is configured with authorized timeserver
  lineinfile:
    path: /etc/systemd/timesyncd.conf
    regexp: '^#?NTP='
    line: 'NTP=0.ubuntu.pool.ntp.org 1.ubuntu.pool.ntp.org 2.ubuntu.pool.ntp.org 3.ubuntu.pool.ntp.org'
    state: present
  when: "'systemd-timesyncd' in ansible_facts.packages"

- name: Ensure systemd-timesyncd is enabled and running
  service:
    name: systemd-timesyncd
    state: started
    enabled: yes
  when: "'systemd-timesyncd' in ansible_facts.packages"

- name: Ensure chrony is configured with authorized timeserver
  lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: '^pool '
    line: 'pool 0.ubuntu.pool.ntp.org iburst'
    state: present
  when: "'chrony' in ansible_facts.packages"

- name: Ensure additional chrony timeservers
  lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: '^server '
    line: 'server 1.ubuntu.pool.ntp.org iburst'
    state: present
  when: "'chrony' in ansible_facts.packages"

- name: Ensure chrony is running as user _chrony
  lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: '^#?user '
    line: 'user _chrony'
    state: present
  when: "'chrony' in ansible_facts.packages"

- name: Ensure chrony is enabled and running
  service:
    name: chrony
    state: started
    enabled: yes
  when: "'chrony' in ansible_facts.packages"
