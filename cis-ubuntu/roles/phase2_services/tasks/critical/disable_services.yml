---
# Disable unnecessary services according to CIS Ubuntu 24.04 LTS Benchmark

- name: Check and disable telnet service
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - telnet.socket
    - telnet
  when: ansible_facts.services[item] is defined
  ignore_errors: yes

- name: Check and disable rsh service
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - rsh.socket
    - rsh
  when: ansible_facts.services[item] is defined
  ignore_errors: yes

- name: Check and disable rlogin service
  systemd:
