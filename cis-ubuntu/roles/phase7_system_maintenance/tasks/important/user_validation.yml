---
# User account validation and configuration

- name: Ensure accounts in /etc/passwd use shadowed passwords
  shell: |
    awk -F: '($2 != "x") {print $1}' /etc/passwd
  register: non_shadow_accounts
  changed_when: false

- name: Display non-shadowed accounts
  debug:
    msg: "Accounts without shadowed passwords: {{ non_shadow_accounts.stdout_lines }}"
  when: non_shadow_accounts.stdout_lines | length > 0

- name: Ensure /etc/shadow password fields are not empty
  shell: |
    awk -F: '($2 == "" ) { print $1 }' /etc/shadow
  register: empty_password_accounts
  changed_when: false

- name: Display accounts with empty passwords
  debug:
    msg: "Accounts with empty passwords: {{ empty_password_accounts.stdout_lines }}"
  when: empty_password_accounts.stdout_lines | length > 0

- name: Ensure all groups in /etc/passwd exist in /etc/group
  shell: |
    awk -F: '{print $4}' /etc/passwd | sort -u > /tmp/passwd_gids
    awk -F: '{print $3}' /etc/group | sort -u > /tmp/group_gids
    comm -23 /tmp/passwd_gids /tmp/group_gids
  register: missing_groups
  changed_when: false

- name: Display missing groups
  debug:
    msg: "Groups in passwd but not in group: {{ missing_groups.stdout_lines }}"
  when: missing_groups.stdout_lines | length > 0

- name: Ensure shadow group is empty
  shell: |
    awk -F: '($1 == "shadow") {print $1":"$3}' /etc/group
  register: shadow_group_members
  changed_when: false

- name: Display shadow group members
  debug:
    msg: "Shadow group members: {{ shadow_group_members.stdout_lines }}"
  when: shadow_group_members.stdout_lines | length > 0
