---
# Ensure user and group integrity

- name: Ensure accounts in /etc/passwd use shadowed passwords
  shell: |
    # Check if all accounts use 'x' in password field (shadowed passwords)
    awk -F: '($2 != "x") {print $1}' /etc/passwd
  register: non_shadowed_accounts
  changed_when: false

- name: Display accounts not using shadowed passwords
  debug:
    msg: "Accounts not using shadowed passwords: {{ non_shadowed_accounts.stdout_lines }}"
  when: non_shadowed_accounts.stdout_lines is defined

- name: Ensure /etc/shadow password fields are not empty
  shell: |
    awk -F: '($2 == "" || $2 == "!" || $2 == "*") {print $1}' /etc/shadow
  register: empty_password_fields
  changed_when: false

- name: Display accounts with empty password fields
  debug:
    msg: "Accounts with empty password fields: {{ empty_password_fields.stdout_lines }}"
  when: empty_password_fields.stdout_lines is defined

- name: Ensure all groups in /etc/passwd exist in /etc/group
  shell: |
    # Check for missing groups
    awk -F: '{print $4}' /etc/passwd | sort -u | while read gid; do
      if [ -n "$gid" ] && ! grep -q "^$gid:" /etc/group; then
        echo "Group $gid from /etc/passwd not found in /etc/group"
      fi
    done
  register: missing_groups
  changed_when: false

- name: Display missing groups
  debug:
    msg: "Missing groups: {{ missing_groups.stdout_lines }}"
  when: missing_groups.stdout_lines is defined

- name: Ensure shadow group is empty
  shell: |
    grep "^shadow:" /etc/group | cut -d: -f4
  register: shadow_group_members
  changed_when: false

- name: Display shadow group members
  debug:
    msg: "Shadow group members: {{ shadow_group_members.stdout }}"
  when: shadow_group_members.stdout is defined

- name: Ensure no duplicate UIDs exist
  shell: |
    awk -F: '{print $3}' /etc/passwd | sort | uniq -d
  register: duplicate_uids
  changed_when: false

- name: Display duplicate UIDs
  debug:
    msg: "Duplicate UIDs: {{ duplicate_uids.stdout_lines }}"
  when: duplicate_uids.stdout_lines is defined

- name: Ensure no duplicate GIDs exist
  shell: |
    awk -F: '{print $3}' /etc/group | sort | uniq -d
  register: duplicate_gids
  changed_when: false

- name: Display duplicate GIDs
  debug:
    msg: "Duplicate GIDs: {{ duplicate_gids.stdout_lines }}"
  when: duplicate_gids.stdout_lines is defined

- name: Ensure no duplicate user names exist
  shell: |
    awk -F: '{print $1}' /etc/passwd | sort | uniq -d
  register: duplicate_users
  changed_when: false

- name: Display duplicate user names
  debug:
    msg: "Duplicate user names: {{ duplicate_users.stdout_lines }}"
  when: duplicate_users.stdout_lines is defined

- name: Ensure no duplicate group names exist
  shell: |
    awk -F: '{print $1}' /etc/group | sort | uniq -d
  register: duplicate_group_names
  changed_when: false

- name: Display duplicate group names
  debug:
    msg: "Duplicate group names: {{ duplicate_group_names.stdout_lines }}"
  when: duplicate_group_names.stdout_lines is defined
