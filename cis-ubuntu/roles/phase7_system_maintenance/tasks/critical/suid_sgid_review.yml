---
# Review SUID and SGID files

- name: Find SUID files
  shell: |
    find / -type f -perm -4000 -exec ls -la {} \; 2>/dev/null
  register: suid_files
  changed_when: false

- name: Display SUID files
  debug:
    msg: "SUID files found: {{ suid_files.stdout_lines }}"
  when: suid_files.stdout_lines | length > 0

- name: Find SGID files
  shell: |
    find / -type f -perm -2000 -exec ls -la {} \; 2>/dev/null
  register: sgid_files
  changed_when: false

- name: Display SGID files
  debug:
    msg: "SGID files found: {{ sgid_files.stdout_lines }}"
  when: sgid_files.stdout_lines | length > 0

- name: Save SUID/SGID review report
  copy:
    content: |
      SUID Files Review:
      {{ suid_files.stdout }}
      
      SGID Files Review:
      {{ sgid_files.stdout }}
      
      Generated: {{ ansible_date_time.iso8601 }}
    dest: "{{ results_dir }}/phase7/suid_sgid_review.txt"
  delegate_to: localhost
