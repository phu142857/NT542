---
# Configure log rotation

- name: Ensure logrotate is configured
  copy:
    content: |
      # CIS Ubuntu Logrotate Configuration
      # Rotate system logs weekly
      weekly
      
      # Keep 4 weeks of backlogs
      rotate 4
      
      # Create new (empty) log files after rotating old ones
      create
      
      # Use date as a suffix of the rotated file
      dateext
      
      # Compress rotated logs
      compress
      
      # Delay compression to the next rotation cycle
      delaycompress
      
      # Delete uncompressed log files
      missingok
      
      # Rotate empty log files
      notifempty
      
      # Create log directory if it doesn't exist
      create 0640 root adm
      
      # System logs
      /var/log/syslog {
          weekly
          rotate 4
          create 0640 root adm
          compress
          delaycompress
          missingok
          notifempty
          sharedscripts
          postrotate
              /usr/lib/rsyslog/rsyslog-rotate
          endscript
      }
      
      /var/log/auth.log {
          weekly
          rotate 4
          create 0640 root adm
          compress
          delaycompress
          missingok
          notifempty
      }
      
      /var/log/kern.log {
          weekly
          rotate 4
          create 0640 root adm
          compress
          delaycompress
          missingok
          notifempty
      }
      
      /var/log/daemon.log {
          weekly
          rotate 4
          create 0640 root adm
          compress
          delaycompress
          missingok
          notifempty
      }
      
      /var/log/mail.log {
          weekly
          rotate 4
          create 0640 root adm
          compress
          delaycompress
          missingok
          notifempty
      }
      
      /var/log/user.log {
          weekly
          rotate 4
          create 0640 root adm
          compress
          delaycompress
          missingok
          notifempty
      }
      
      # Audit logs
      /var/log/audit/audit.log {
          weekly
          rotate 4
          create 0600 root root
          compress
          delaycompress
          missingok
          notifempty
          sharedscripts
          postrotate
              /sbin/service auditd restart
          endscript
      }
      
      # Sudo logs
      /var/log/sudo.log {
          weekly
          rotate 4
          create 0640 root adm
          compress
          delaycompress
          missingok
          notifempty
      }
    dest: /etc/logrotate.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart rsyslog

- name: Ensure logrotate configuration for audit logs
  copy:
    content: |
      /var/log/audit/audit.log {
          daily
          missingok
          rotate 52
          compress
          delaycompress
          sharedscripts
              postrotate
                  /usr/lib/rsyslog/rsyslog-postrotate
                  /usr/sbin/service auditd reload >/dev/null 2>&1 || true
          endscript
                  /usr/lib/rsyslog/rsyslog-postrotate
                  /usr/sbin/service auditd reload >/dev/null 2>&1 || true
      }
    dest: /etc/logrotate.d/audit
    owner: root
    group: root
    mode: '0644'

- name: Ensure logrotate configuration for system logs
  copy:
    content: |
      /var/log/syslog {
          weekly
          missingok
          rotate 4
          compress
          delaycompress
          sharedscripts
              postrotate
                  /usr/lib/rsyslog/rsyslog-postrotate
                  /usr/sbin/service rsyslog reload >/dev/null 2>&1 || true
          endscript
                  /usr/lib/rsyslog/rsyslog-postrotate
                  /usr/sbin/service rsyslog reload >/dev/null 2>&1 || true
      }
    dest: /etc/logrotate.d/syslog
    owner: root
    group: root
    mode: '0644'

- name: Ensure logrotate configuration for auth logs
  copy:
    content: |
      /var/log/auth.log {
          monthly
          missingok
          rotate 12
          compress
          delaycompress
          sharedscripts
              postrotate
                  /usr/lib/rsyslog/rsyslog-postrotate
                  /usr/sbin/service rsyslog reload >/dev/null 2>&1 || true
          endscript
                  /usr/lib/rsyslog/rsyslog-postrotate
                  /usr/sbin/service rsyslog reload >/dev/null 2>&1 || true
      }
    dest: /etc/logrotate.d/auth
    owner: root
    group: root
    mode: '0644'

- name: Ensure logrotate configuration for kern logs
  copy:
    content: |
      /var/log/kern.log {
          monthly
          missingok
          rotate 12
          compress
          delaycompress
          sharedscripts
              postrotate
                  /usr/lib/rsyslog/rsyslog-postrotate
                  /usr/sbin/service rsyslog reload >/dev/null 2>&1 || true
          endscript
                  /usr/lib/rsyslog/rsyslog-postrotate
                  /usr/sbin/service rsyslog reload >/dev/null 2>&1 || true
      }
    dest: /etc/logrotate.d/kern
    owner: root
    group: root
    mode: '0644'

- name: Create logrotate template
  copy:
    content: |
      # Logrotate configuration template
      # Compress old logs
      compress
      
      # Delay compression by one day
      delaycompress
      
      # Keep old logs for specified duration
      rotate {{ item.rotate | default(4) }}
      
      # Don't error if log file is missing
      missingok
      
      # Run post-rotation script
      sharedscripts
          postrotate
              /usr/lib/rsyslog/rsyslog-postrotate
              /usr/sbin/service rsyslog reload >/dev/null 2>&1 || true
          endscript
              /usr/lib/rsyslog/rsyslog-postrotate
              /usr/sbin/service rsyslog reload >/dev/null 2>&1 || true
    dest: /etc/logrotate.d/template
    owner: root
    group: root
    mode: '0644'
  loop:
    - { path: /var/log/audit/audit.log, rotate: 52 }
    - { path: /var/log/syslog, rotate: 4 }
    - { path: /var/log/auth.log, rotate: 12 }
    - { path: /var/log/kern.log, rotate: 12 }

- name: Ensure logrotate cron job is configured
  cron:
    name: "logrotate"
    job: "/usr/sbin/logrotate /etc/logrotate.conf"
    minute: "30"
    hour: "2"
    day: "*"
    month: "*"
    weekday: "*"
    state: present

- name: Restart rsyslog service
  service:
    name: rsyslog
    state: restarted
    enabled: yes
