- name: Install PAM password quality module
  package:
    name:
      - libpam-pwquality
      - cracklib-runtime
    state: present

- name: Configure pwquality settings
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^{{ item.key }}'
    line: "{{ item.key }} = {{ item.value }}"
    create: yes
  loop:
    - { key: 'minlen', value: '{{ password_min_length | default(14) }}' }
    - { key: 'dcredit', value: '{{ password_digit_credit | default(-1) }}' }
    - { key: 'ucredit', value: '{{ password_upper_credit | default(-1) }}' }
    - { key: 'lcredit', value: '{{ password_lower_credit | default(-1) }}' }
    - { key: 'ocredit', value: '{{ password_special_credit | default(-1) }}' }
    - { key: 'minclass', value: '{{ password_min_classes | default(3) }}' }
    - { key: 'maxrepeat', value: '{{ password_max_repeat | default(3) }}' }
    - { key: 'difok', value: '{{ password_diff_chars | default(5) }}' }

- name: Configure PAM to use pwquality
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^password.*pam_pwquality.so'
    line: "password [success=1 default=ignore] pam_pwquality.so retry=3"
    create: yes

- name: Configure password history in PAM
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^password.*pam_unix.so'
    line: "password [success=1 default=ignore] pam_unix.so obscure sha512 shadow remember={{ password_history | default(5) }}"
    create: yes

- name: Configure account lockout policy
  blockinfile:
    path: /etc/pam.d/common-account
    block: |
      # Account lockout policy
      account required pam_faillock.so preauth silent audit deny={{ password_fail_deny | default(3) }} unlock_time={{ password_unlock_time | default(900) }}
      account required pam_faillock.so authfail audit deny={{ password_fail_deny | default(3) }} unlock_time={{ password_unlock_time | default(900) }}
      account sufficient pam_successlock.so
    create: yes

- name: Set password max days
  lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: "PASS_MAX_DAYS {{ password_max_days }}"

- name: Set password min days
  lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS'
    line: "PASS_MIN_DAYS {{ password_min_days }}"

- name: Set password warn age
  lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: "PASS_WARN_AGE {{ password_warn_days }}"

- name: Create password policy validation script
  copy:
    dest: /tmp/password_policy_validation.sh
    mode: '0755'
    content: |
      #!/bin/bash
      echo "=== Password Policy Validation Report ==="
      echo "Generated on: $(date)"
      echo ""
      
      echo "1. Password Policy Configuration:"
      echo "   - Min Length: $(grep '^PASS_MIN_LEN' /etc/login.defs 2>/dev/null || echo 'Not set')"
      echo "   - Max Days: $(grep '^PASS_MAX_DAYS' /etc/login.defs | awk '{print $2}')"
      echo "   - Min Days: $(grep '^PASS_MIN_DAYS' /etc/login.defs | awk '{print $2}')"
      echo "   - Warn Age: $(grep '^PASS_WARN_AGE' /etc/login.defs | awk '{print $2}')"
      echo ""
      
      echo "2. PAM Configuration:"
      echo "   - pwquality module: $(grep -c 'pam_pwquality.so' /etc/pam.d/common-password)"
      echo "   - password history: $(grep -o 'remember=[0-9]*' /etc/pam.d/common-password || echo 'Not configured')"
      echo "   - faillock policy: $(grep -c 'pam_faillock.so' /etc/pam.d/common-account)"
      echo ""
      
      echo "3. pwquality Settings:"
      if [ -f /etc/security/pwquality.conf ]; then
          grep -E '^(minlen|dcredit|ucredit|lcredit|ocredit|minclass)' /etc/security/pwquality.conf | sed 's/^/   /'
      else
          echo "   pwquality.conf not found"
      fi
      echo ""
      
      echo "4. CIS Compliance Check:"
      echo "   - Minimum password length >= 14: $([ $(grep '^PASS_MIN_LEN' /etc/login.defs 2>/dev/null | awk '{print $2}' || echo 0) -ge 14 ] && echo 'PASS' || echo 'FAIL')"
      echo "   - Maximum password days <= 90: $([ $(grep '^PASS_MAX_DAYS' /etc/login.defs | awk '{print $2}') -le 90 ] && echo 'PASS' || echo 'FAIL')"
      echo "   - Minimum password days >= 7: $([ $(grep '^PASS_MIN_DAYS' /etc/login.defs | awk '{print $2}') -ge 7 ] && echo 'PASS' || echo 'FAIL')"
      echo "   - Password history configured: $([ -f /etc/pam.d/common-password ] && grep -q 'remember=' /etc/pam.d/common-password && echo 'PASS' || echo 'FAIL')"
      echo "   - Account lockout configured: $([ -f /etc/pam.d/common-account ] && grep -q 'pam_faillock.so' /etc/pam.d/common-account && echo 'PASS' || echo 'FAIL')"

- name: Run password policy validation
  shell: /tmp/password_policy_validation.sh > /tmp/password_policy_report.txt

- name: Display password policy validation results
  command: cat /tmp/password_policy_report.txt
  register: password_validation_results

- name: Show password policy validation
  debug:
    var: password_validation_results.stdout_lines
