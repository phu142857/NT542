---
# Password Quality Configuration

- name: Ensure minimum password length is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?minlen'
    line: 'minlen = 14'
    state: present

- name: Ensure password number of changed characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?difok'
    line: 'difok = 3'
    state: present

- name: Ensure password same consecutive characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?maxrepeat'
    line: 'maxrepeat = 3'
    state: present

- name: Ensure password maximum sequential characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?maxsequence'
    line: 'maxsequence = 3'
    state: present

- name: Ensure password dictionary check is enabled
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?dictcheck'
    line: 'dictcheck = 1'
    state: present

- name: Ensure password quality checking is enforced
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?enforcing'
    line: 'enforcing = 1'
    state: present

- name: Ensure password history remember is configured
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '.*pam_pwhistory.so.*remember='
    line: 'password  sufficient   pam_pwhistory.so use_authtok remember=5'
    state: present

- name: Ensure password expiration is configured
  lineinfile:
    path: /etc/login.defs
    regexp: '^#?PASS_MAX_DAYS'
    line: 'PASS_MAX_DAYS 365'
    state: present

- name: Ensure password expiration warning days is configured
  lineinfile:
    path: /etc/login.defs
    regexp: '^#?PASS_WARN_AGE'
    line: 'PASS_WARN_AGE 7'
    state: present

- name: Ensure inactive password lock is configured
  lineinfile:
    path: /etc/login.defs
    regexp: '^#?INACTIVE'
    line: 'INACTIVE 30'
    state: present

- name: Ensure strong password hashing algorithm is configured
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^password.*pam_unix.so.*sha512'
    line: 'password  [success=1 default=ignore]  pam_unix.so obscure use_authtok try_first_pass sha512'
    state: present
