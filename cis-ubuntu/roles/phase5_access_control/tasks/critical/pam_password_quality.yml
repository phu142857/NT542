---
# Configure PAM password quality

- name: Ensure latest version of pam is installed
  package:
    name: libpam-modules
    state: present

- name: Ensure libpam-modules is installed
  package:
    name: libpam-modules-bin
    state: present

- name: Ensure libpam-pwquality is installed
  package:
    name: libpam-pwquality
    state: present

- name: Ensure pam_unix module is enabled
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^#?password.*pam_unix.so'
    line: 'password [success=1 default=ignore] pam_unix.so obscure sha512'
    state: present

- name: Ensure pam_faillock module is enabled
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^#?password.*pam_faillock.so'
    line: 'password requisite pam_faillock.so retry=3'
    state: present

- name: Ensure pam_pwquality module is enabled
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^#?password.*pam_pwquality.so'
    line: 'password requisite pam_pwquality.so retry=3'
    state: present

- name: Ensure pam_pwhistory module is enabled
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^#?password.*pam_pwhistory.so'
    line: 'password optional pam_pwhistory.so use_authtok remember=5'
    state: present

- name: Configure password quality settings
  copy:
    content: |
      # Minimum password length
      minlen = 14
      
      # Minimum number of character classes
      minclass = 3
      
      # Maximum consecutive same characters
      maxrepeat = 3
      
      # Maximum sequential characters
      maxsequence = 4
      
      # Check for common patterns
      dictcheck = 1
      
      # Check for username
      usercheck = 1
      
      # Check for simple words
      enforce_for_root
    dest: /etc/security/pwquality.conf
    mode: '0644'
    owner: root
    group: root

- name: Ensure password failed attempts lockout is configured
  lineinfile:
    path: /etc/pam.d/common-account
    regexp: '^#?account.*pam_faillock.so'
    line: 'account required pam_faillock.so'
    state: present

- name: Ensure password unlock time is configured
  lineinfile:
    path: /etc/pam.d/common-account
    regexp: '^#?account.*pam_faillock.so'
    line: 'account required pam_faillock.so unlock_time=1800'
    state: present

- name: Ensure password failed attempts lockout includes root account
  lineinfile:
    path: /etc/pam.d/common-account
    regexp: '^#?account.*pam_faillock.so'
    line: 'account required pam_faillock.so even_deny_root'
    state: present

- name: Ensure password number of changed characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?dcredit'
    line: 'dcredit = -1'
    state: present

- name: Ensure password minimum length is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?minlen'
    line: 'minlen = 14'
    state: present

- name: Ensure password same consecutive characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?maxrepeat'
    line: 'maxrepeat = 3'
    state: present

- name: Ensure password maximum sequential characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?maxsequence'
    line: 'maxsequence = 4'
    state: present

- name: Ensure password dictionary check is enabled
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?dictcheck'
    line: 'dictcheck = 1'
    state: present

- name: Ensure password quality is enforced for root user
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?enforce_for_root'
    line: 'enforce_for_root'
    state: present
