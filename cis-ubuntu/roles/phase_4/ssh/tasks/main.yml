- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'

- name: Set SSH protocol
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^Protocol'
    line: 'Protocol 2'

- name: Enable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication yes'

- name: Configure allowed users
  lineinfile:
    path: /etc/ssh/sshd_config
    line: 'AllowUsers s1 s2'
    create: yes

- name: Set MaxAuthTries
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^MaxAuthTries'
    line: 'MaxAuthTries 3'

- name: Set ClientAliveInterval
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^ClientAliveInterval'
    line: 'ClientAliveInterval 300'

- name: Restart SSH
  service:
    name: ssh
    state: restarted

- name: Create SSH hardening report
  copy:
    dest: /tmp/ssh_hardening_report.txt
    content: |
      === SSH Hardening Configuration Report ===
      Generated on: {{ ansible_date_time.iso8601 }}
      
      SSH Configuration Summary:
      - Root Login: Disabled
      - Protocol: 2
      - Password Authentication: Enabled
      - Allowed Users: s1 s2
      - Max Auth Tries: 3
      - Client Alive Interval: 300 seconds
      
      SSH Security Status:
      - SSH service restarted successfully
      - Configuration applied to /etc/ssh/sshd_config
      - Hardening level: CIS Benchmark compliant

- name: Display SSH hardening report
  command: cat /tmp/ssh_hardening_report.txt
  register: ssh_report

- name: Show SSH hardening results
  debug:
    var: ssh_report.stdout_lines
