---
# Configure UFW firewall (Recommended for Ubuntu)

- name: Ensure ufw is installed
  package:
    name: ufw
    state: present

- name: Ensure iptables-persistent is not installed with ufw
  package:
    name: iptables-persistent
    state: absent
  when: cis_firewall_type == "ufw" or cis_firewall_type is not defined

- name: Ensure ufw service is enabled
  service:
    name: ufw
    state: started
    enabled: yes
  when: cis_firewall_type == "ufw" or cis_firewall_type is not defined

- name: Ensure ufw loopback traffic is configured
  ufw:
    rule: allow
    interface: lo
    direction: in
  when: cis_firewall_type == "ufw" or cis_firewall_type is not defined

- name: Ensure ufw default deny firewall policy
  ufw:
    state: enabled
    policy: deny
    direction: incoming
  when: cis_firewall_type == "ufw" or cis_firewall_type is not defined

- name: Ensure ufw firewall rules exist for all open ports
  ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
  loop: "{{ cis_allowed_ports | default([]) }}"
  when: cis_firewall_type == "ufw" or cis_firewall_type is not defined
