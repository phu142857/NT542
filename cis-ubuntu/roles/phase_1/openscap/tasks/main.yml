---
- name: Install OpenSCAP
  apt:
    name: 
      - openscap-scanner
      - openscap-utils
    state: present
    update_cache: yes

- name: Check OpenSCAP version
  command: oscap --version
  register: openscap_version
  changed_when: false

- name: Display OpenSCAP information
  debug:
    msg: "OpenSCAP installed successfully. Version: {{ openscap_version.stdout_lines[0] }}"

- name: Create basic OpenSCAP info report
  command: oscap --version > /tmp/openscap_info.txt
  changed_when: false

- name: Save OpenSCAP report
  copy:
    content: "{{ openscap_version.stdout }}"
    dest: /tmp/openscap_scan_result.txt
