---
- name: Enable ASLR
  sysctl:
    name: kernel.randomize_va_space
    value: 2
    sysctl_file: /etc/sysctl.d/99-security.conf
    state: present

- name: Apply ASLR settings
  shell: sysctl -p /etc/sysctl.d/99-security.conf
  changed_when: false

- name: Create ASLR report
  copy:
    dest: /tmp/aslr_config_report.txt
    content: |
      === ASLR Configuration Report ===
      Generated on: {{ ansible_date_time.iso8601 }}
      
      ASLR Configuration:
      - kernel.randomize_va_space: 2 (Full randomization)
      - Status: ENABLED
      
      Report saved to: /tmp/aslr_config_report.txt
