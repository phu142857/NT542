---
- name: Configure additional system security settings
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-security.conf
  with_items:
    - { name: kernel.dmesg_restrict, value: 1 }
    - { name: kernel.kptr_restrict, value: 1 }
  when: ansible_os_family == "Debian"

- name: Apply system settings
  shell: sysctl -p /etc/sysctl.d/99-security.conf
  changed_when: false
