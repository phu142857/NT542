- name: Get service facts
  service_facts:

- name: Check if cups service exists
  shell: systemctl list-unit-files | grep cups || echo "not_found"
  register: cups_check
  changed_when: false
  failed_when: false

- name: Disable cups service
  service:
    name: cups
    state: stopped
    enabled: no
  when: "'cups' in cups_check.stdout"

- name: Disable unnecessary services
  service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - bluetooth
    - cups-browsed
    - avahi-daemon
    - whoopsie
  when: item in ansible_facts.services
  ignore_errors: true

- name: Configure service startup restrictions
  lineinfile:
    path: /etc/systemd/system.conf
    regexp: '^DefaultDependencies'
    line: 'DefaultDependencies=no'
    create: yes

- name: Secure network services
  service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - telnet
    - rsh
  when: item in ansible_facts.services
  ignore_errors: true

- name: Enable critical services
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - ssh
    - ufw
    - auditd
    - rsyslog
  when: item in ansible_facts.services
  ignore_errors: true
