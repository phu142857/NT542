- name: Apply CIS Ubuntu Hardening
  hosts: ubuntu_servers
  become: yes

  vars_files:
    - ../group_vars/all.yml

  roles:
    # Phase 1: Initial Setup and System Information
    - phase_1/system_info
    - phase_1/packages
    - phase_1/openscap
    - phase_1/lynis
    
    # Phase 2: Filesystem Configuration
    - phase_2/filesystem
    - phase_2/system_settings
    - phase_2/aslr
    
    # Phase 3: Password and Authentication
    - phase_3/password_policy
    
    # Phase 4: SSH Configuration
    - phase_4/ssh
    
    # Phase 5: Services Configuration
    - phase_5/services
    
    # Phase 6: Network and Firewall
    - phase_6/network
    - phase_6/firewall
    
    # Phase 7: Logging and Audit
    - phase_7/logging_audit
    
    # Phase 8: Compliance and Verification
    - phase_8/compliance_scan
    - phase_8/comprehensive_report 
