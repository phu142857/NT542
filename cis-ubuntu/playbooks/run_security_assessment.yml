---
- name: Complete Security Assessment - Setup
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
  vars:
    results_dir: "../results"
    
  tasks:
    - name: Ensure results directory exists
      file:
        path: "{{ results_dir }}"
        state: directory
        mode: '0755'
        
    - name: Display assessment start time
      debug:
        msg: "Starting comprehensive security assessment at {{ ansible_date_time.iso8601 }}"

- import_playbook: security_assessment_lynis.yml

- import_playbook: security_assessment_openscap.yml

- name: Complete Security Assessment - Summary
  hosts: all
  become: yes
  vars_files:
    - ../group_vars/all.yml
  vars:
    results_dir: "../results"
    
  tasks:
    - name: Display assessment completion
      debug:
        msg: "Security assessment completed. All results saved to {{ results_dir }}/"
